version: '3.8'

services:
  master:
    build:
      # Build from the repo root so the top-level ansible/ tree is
      # available to the Dockerfile (it gets COPY'd to /app/ansible
      # and served by the /api/v1/static/ansible.tar.gz endpoint).
      context: .
      dockerfile: master/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - data_master:/app/data
    environment:
      - KOSATKA_API_KEY=${KOSATKA_API_KEY}
      - KOSATKA_DATABASE_URL=sqlite+aiosqlite:///./data/kosatka.db
    restart: always

volumes:
  data_master:
