---
- name: Ensure apt cache is fresh
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - git
      - htop
      - ufw
      - ca-certificates
      - gnupg
      - jq
      - python3-pip
    state: present

- name: Install Docker prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - software-properties-common
    state: present

- name: Ensure Docker keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker's official GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
    filename: docker
    state: present

- name: Install Docker engine + compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure docker service is running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Install python docker SDK (required by community.docker.* modules)
  ansible.builtin.pip:
    name:
      - docker
    state: present
    break_system_packages: true
