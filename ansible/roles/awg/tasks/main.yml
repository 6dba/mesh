---
# Real installation of AmneziaWG + interface bootstrap on a node.
# Supports Debian/Ubuntu and RHEL/CentOS families with a fallback to userspace Go implementation.

- name: Install Common Dependencies
  ansible.builtin.package:
    name:
      - curl
      - wget
      - tar
      - gzip
    state: present

- name: Setup AmneziaWG (Kernel Module)
  block:
    - name: Ubuntu / Debian specific setup
      when: ansible_os_family == "Debian"
      block:
        - name: Ensure kernel headers are installed
          ansible.builtin.apt:
            name: "linux-headers-{{ ansible_kernel }}"
            state: present
            update_cache: true
          when: ansible_kernel is defined

        - name: Install software-properties-common
          ansible.builtin.apt:
            name: software-properties-common
            state: present

        - name: Add AmneziaVPN apt repository (Ubuntu)
          ansible.builtin.apt_repository:
            repo: "ppa:amnezia/ppa"
            state: present
            update_cache: true
          when: ansible_distribution == "Ubuntu"

        - name: Install AmneziaWG tools and kernel module
          ansible.builtin.apt:
            name:
              - amneziawg
              - amneziawg-tools
              - amneziawg-dkms
            state: present

    - name: RHEL / CentOS specific setup
      when: ansible_os_family == "RedHat"
      block:
        - name: Install EPEL release
          ansible.builtin.yum:
            name: epel-release
            state: present

        - name: Install kernel headers
          ansible.builtin.yum:
            name: "kernel-headers"
            state: present

        - name: Install AmneziaWG via Copr / pre-built RPMs (Placeholder for RHEL)
          # Amnezia provides source builds, so for RHEL we might default to Go
          ansible.builtin.fail:
            msg: "Native DKMS for RHEL is not natively packaged yet. Failing over to amneziawg-go."

  rescue:
    - name: Fallback to Userspace Implementation (amneziawg-go)
      ansible.builtin.debug:
        msg: "Kernel module installation failed or unsupported. Falling back to amneziawg-go (Userspace)."

    - name: Download amneziawg-go binary
      ansible.builtin.get_url:
        url: "https://github.com/amnezia-vpn/amneziawg-go/releases/latest/download/amneziawg-go_linux_amd64"
        dest: /usr/bin/amneziawg-go
        mode: '0755'

    - name: Download amneziawg-tools (awg, awg-quick)
      ansible.builtin.get_url:
        url: "https://github.com/amnezia-vpn/amneziawg-tools/releases/latest/download/awg_linux_amd64"
        dest: /usr/bin/awg
        mode: '0755'

    - name: Download awg-quick script
      ansible.builtin.get_url:
        url: "https://raw.githubusercontent.com/amnezia-vpn/amneziawg-tools/master/src/wg-quick/linux.bash"
        dest: /usr/bin/awg-quick
        mode: '0755'

- name: Ensure amneziawg config directory exists
  ansible.builtin.file:
    path: /etc/amnezia/amneziawg
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Check whether server private key already exists
  ansible.builtin.stat:
    path: /etc/amnezia/amneziawg/privatekey
  register: awg_privkey_stat

- name: Generate server private key
  ansible.builtin.shell: "awg genkey > /etc/amnezia/amneziawg/privatekey"
  args:
    creates: /etc/amnezia/amneziawg/privatekey
  when: not awg_privkey_stat.stat.exists

- name: Tighten permissions on server private key
  ansible.builtin.file:
    path: /etc/amnezia/amneziawg/privatekey
    owner: root
    group: root
    mode: "0600"

- name: Derive server public key
  ansible.builtin.shell: "awg pubkey < /etc/amnezia/amneziawg/privatekey > /etc/amnezia/amneziawg/publickey"
  args:
    creates: /etc/amnezia/amneziawg/publickey

- name: Read server private key
  ansible.builtin.slurp:
    src: /etc/amnezia/amneziawg/privatekey
  register: awg_privkey_slurp

- name: Read server public key
  ansible.builtin.slurp:
    src: /etc/amnezia/amneziawg/publickey
  register: awg_pubkey_slurp

- name: Render server wg0.conf
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: /etc/amnezia/amneziawg/wg0.conf
    owner: root
    group: root
    mode: "0600"
  vars:
    awg_server_private_key: "{{ awg_privkey_slurp.content | b64decode | trim }}"
  notify: restart awg-quick

- name: Enable net.ipv4.ip_forward
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    state: present
    reload: true
    sysctl_set: true

- name: Enable and start awg-quick@wg0
  ansible.builtin.systemd:
    name: "awg-quick@wg0"
    enabled: true
    state: started
    daemon_reload: true

- name: Publish server public key + endpoint + AWG obfuscation params for the agent
  ansible.builtin.copy:
    dest: /opt/kosatka/agent/awg_server.json
    mode: "0640"
    content: |
      {
        "public_key": "{{ awg_pubkey_slurp.content | b64decode | trim }}",
        "endpoint": "{{ awg_public_endpoint | default(ansible_host | default(inventory_hostname)) }}:{{ awg_listen_port | default(51820) }}",
        "subnet": "{{ awg_subnet | default('10.8.0.0/24') }}",
        "dns": "{{ awg_dns | default('1.1.1.1, 1.0.0.1') }}",
        "Jc": {{ awg_jc | default(4) }},
        "Jmin": {{ awg_jmin | default(40) }},
        "Jmax": {{ awg_jmax | default(70) }},
        "S1": {{ awg_s1 | default(50) }},
        "S2": {{ awg_s2 | default(100) }},
        "H1": {{ awg_h1 | default(1) }},
        "H2": {{ awg_h2 | default(2) }},
        "H3": {{ awg_h3 | default(3) }},
        "H4": {{ awg_h4 | default(4) }}
      }
