---
- name: Allow SSH
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow HTTP/HTTPS (for Caddy on master hosts)
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "80"
    - "443"
  when: "'master' in group_names"

- name: Allow AmneziaWG/WireGuard UDP port on nodes that use it
  community.general.ufw:
    rule: allow
    port: "{{ awg_listen_port | default(51820) }}"
    proto: udp
  when:
    - "'nodes' in group_names"
    - (kosatka_provider_type | default('awg')) in ['awg', 'amneziawg', 'wireguard']

- name: Allow agent port on nodes
  community.general.ufw:
    rule: allow
    port: "{{ agent_port | default(8001) }}"
    proto: tcp
  when: "'nodes' in group_names"

- name: Enable UFW
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming
