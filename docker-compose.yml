version: '3.8'

services:
  master:
    build:
      # Build from the repo root so the top-level ansible/ tree is
      # available to the Dockerfile (it gets COPY'd to /app/ansible
      # and served by the /api/v1/static/ansible.tar.gz endpoint).
      context: .
      dockerfile: master/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./master:/app
      - ./ansible:/app/ansible:ro
      - data_master:/app/data
    environment:
      - KOSATKA_API_KEY=dev-key
      - KOSATKA_DATABASE_URL=sqlite+aiosqlite:///./data/kosatka.db
    command: uvicorn kosatka_master.main:app --host 0.0.0.0 --port 8000 --reload

  agent-mock:
    image: alpine
    command: sh -c "while true; do echo 'Mock Agent heartbeat'; sleep 60; done"
    environment:
      - KOSATKA_MASTER_URL=http://master:8000
      - KOSATKA_API_KEY=dev-key

volumes:
  data_master:
